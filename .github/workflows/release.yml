name: Release

# Tag-triggered signed release. Extends the CI (typecheck+build); here we also compile native
# modules, package per-OS, sign + notarize, publish to the GitHub Releases feed (electron-updater
# reads it), and upload sourcemaps to Sentry.
on:
  push:
    tags:
      - 'v*'
  # Re-runnable against an existing tag (runs THIS workflow from main, so fixes
  # apply without re-tagging): gh workflow run Release -f tag=v0.3.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build + upload for'
        required: true

# electron-builder publishes the signed artifacts to a GitHub Release.
permissions:
  contents: write

jobs:
  release:
    name: build + sign + publish (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    # A hung native rebuild must never burn hours of runner time (the 2026-07
    # ubuntu image hangs @electron/rebuild's spawned node-gyp — see ci.yml).
    timeout-minutes: 60
    env:
      # Present only when the Sentry secret is configured; gates the sourcemap upload step
      # (secrets can't be read directly in `if:`, so we surface it as an env var).
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # Linux native-module toolchain (Phase-4/06: AppImage + deb ride the same feed).
      - name: Linux toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-setuptools

      # Python >= 3.12 dropped distutils; node-gyp needs setuptools (README-documented).
      - name: macOS toolchain
        if: runner.os == 'macOS'
        run: python3 -m pip install --break-system-packages setuptools

      # Install deps AND rebuild native modules (node-pty, better-sqlite3) for Electron's ABI
      # from source — the runners have the C++ toolchain (VS Build Tools / Xcode CLT).
      # npm_config_node_gyp: @electron/rebuild bundles an old node-gyp that cannot
      # find VS2022 — point it at our devDep node-gyp >= 13 (same fix the README
      # documents for local installs).
      - name: Install dependencies
        if: runner.os != 'Linux'
        run: npm ci
        env:
          npm_config_node_gyp: ${{ github.workspace }}/node_modules/node-gyp/bin/node-gyp.js

      # Linux: @electron/rebuild's SPAWNED node-gyp produces zero output forever on
      # the 2026-07 ubuntu image (direct invocation builds in ~90s — bisected in
      # ci.yml, run 28639452382). Same bypass as the CI sweep jobs: skip install
      # scripts, fetch Electron's binary explicitly, drive node-gyp directly.
      - name: Install dependencies (Linux — direct node-gyp bypass)
        if: runner.os == 'Linux'
        run: |
          npm ci --ignore-scripts
          node node_modules/electron/install.js
          EV=$(node -p "require('electron/package.json').version")
          for m in node-pty better-sqlite3; do
            echo "── rebuilding $m for electron $EV"
            (cd "node_modules/$m" && timeout 10m node ../node-gyp/bin/node-gyp.js rebuild \
              --runtime=electron --target="$EV" \
              --dist-url=https://www.electronjs.org/headers --build-from-source < /dev/null)
          done

      - name: Build (emits sourcemaps)
        run: npm run build

      # --publish never + explicit gh upload: electron-builder refuses to upload to
      # an already-PUBLISHED release (it only manages drafts), which silently
      # detaches artifacts from gh-created releases. gh upload --clobber always works.
      # Linux packaging must TRUST the direct-gyp .node files above: its internal
      # rebuild is the same @electron/rebuild spawn that hangs on this image.
      - name: Package (sign/notarize when secrets present)
        run: npx electron-builder --publish never ${{ runner.os == 'Linux' && '-c.npmRebuild=false -c.buildDependenciesFromSource=false' || '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing — base64-encoded cert + password: Authenticode (.pfx) on Windows,
          # Developer ID (.p12) on macOS. Certs live ONLY in CI secrets — never committed.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # macOS notarization via notarytool.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # No Developer ID cert yet: skip identity lookup so mac artifacts build
          # UNSIGNED instead of failing. FLIP TO 'true' when certs land (Phase-5/02).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts to the release
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          shopt -s nullglob
          FILES=(dist/*.exe dist/*.exe.blockmap dist/*.dmg dist/*.zip dist/*.AppImage dist/*.deb dist/latest*.yml)
          gh release upload "$TAG" "${FILES[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload sourcemaps so Sentry de-minifies crash stacks (ADR 0005). Skipped without a token.
      - name: Upload sourcemaps to Sentry
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        uses: getsentry/action-release@v1
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          version: ${{ github.ref_name }}
          sourcemaps: ./out
          finalize: true
