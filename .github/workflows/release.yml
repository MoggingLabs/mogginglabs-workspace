name: Release

# Tag-triggered signed release. Extends the CI (typecheck+build); here we also compile native
# modules, package per-OS, sign + notarize, publish to the GitHub Releases feed (electron-updater
# reads it), and upload sourcemaps to Sentry.
on:
  push:
    tags:
      - 'v*'
  # Re-runnable against an existing tag (runs THIS workflow from main, so fixes
  # apply without re-tagging): gh workflow run Release -f tag=v0.3.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build + upload for'
        required: true

# electron-builder publishes the signed artifacts to a GitHub Release.
permissions:
  contents: write

jobs:
  # `gh release upload` (below) requires the release to EXIST — electron-builder runs
  # --publish never and never creates one. A tag pushed without a hand-created release
  # left all three OS jobs dying at upload with "release not found" (runs 29092932022 /
  # 29093758908, v0.8.0/v0.7.0). ONE job creates it (a matrix step would race and drafts
  # don't claim tags — duplicates possible), as a DRAFT so the curated body can land
  # before it is published to the electron-updater feed. Hand-created releases (the
  # usual path) short-circuit here.
  ensure-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Create the release if missing (draft)
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release view "$TAG" >/dev/null 2>&1 && exit 0
          gh release create "$TAG" --verify-tag --draft \
            --title "$(git log -1 --format=%s)" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: build + sign + publish (${{ matrix.os }})
    needs: ensure-release
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-26, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    # A hung native rebuild must never burn hours of runner time (the 2026-07
    # ubuntu image hangs @electron/rebuild's spawned node-gyp — see ci.yml).
    timeout-minutes: 60
    env:
      # Present only when the Sentry secret is configured; gates the sourcemap upload step
      # (secrets can't be read directly in `if:`, so we surface it as an env var).
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      # Linux native-module toolchain (Phase-4/06: AppImage + deb ride the same feed).
      - name: Linux toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-setuptools

      # Python >= 3.12 dropped distutils; node-gyp needs setuptools (README-documented).
      - name: macOS toolchain
        if: runner.os == 'macOS'
        run: python3 -m pip install --break-system-packages setuptools

      # ALL platforms use the direct node-gyp bypass now. @electron/rebuild's
      # SPAWNED node-gyp is broken across the whole 2026-07 image family — zero
      # output forever: ubuntu (bisected, run 28639452382), windows (run
      # 28647921078), and — as of 2026-07-05 — macOS too, hanging 59 min on
      # `preparing better-sqlite3 arch=arm64` (run 28756024650) where the full
      # `npm ci` used to work (28648120189, 2026-07-03). Drive node-gyp (>= 13,
      # a devDep since v0.3.0) directly, for the RUNNER-NATIVE arch.
      #
      # macOS consequence: the bypass builds arm64 only (the macos-26 runner's
      # native arch), so the mac release is arm64-only for now. Apple Silicon is
      # the overwhelming majority of Macs; Intel x64 is DEFERRED until the image
      # hang is fixed upstream or a dedicated x64 runner lands (docs/10). The
      # Package step passes --arm64 to match.
      # ONE definition of the direct-gyp dance — .github/actions/electron-native-rebuild
      # (the long comment above explains why @electron/rebuild's spawn cannot be used).
      - name: Native install + Electron-ABI rebuild
        timeout-minutes: 25
        uses: ./.github/actions/electron-native-rebuild
      - name: Build (emits sourcemaps)
        run: npm run build

      # Code signing — base64-encoded cert + password: Authenticode (.pfx) on Windows,
      # Developer ID (.p12) on macOS; APPLE_* drive notarytool. Certs live ONLY in
      # CI secrets — never committed. An UNSET secret must stay ABSENT from the
      # env: electron-builder treats an empty-string CSC_LINK as a cert path and
      # dies with "not a file" (bit the mac leg, run 28647922891).
      - name: Stage signing env (absent secrets stay absent)
        shell: bash
        env:
          S_CSC_LINK: ${{ secrets.CSC_LINK }}
          S_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          S_APPLE_ID: ${{ secrets.APPLE_ID }}
          S_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          S_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          stage() {
            local name="$1" val="${!2}"
            if [ -n "$val" ]; then
              { echo "$name<<__MOG_EOF__"; echo "$val"; echo "__MOG_EOF__"; } >> "$GITHUB_ENV"
              echo "staged $name"
            else
              echo "skipped $name (secret not set)"
            fi
          }
          stage CSC_LINK S_CSC_LINK
          stage CSC_KEY_PASSWORD S_CSC_KEY_PASSWORD
          stage APPLE_ID S_APPLE_ID
          stage APPLE_APP_SPECIFIC_PASSWORD S_APPLE_APP_SPECIFIC_PASSWORD
          stage APPLE_TEAM_ID S_APPLE_TEAM_ID

      # --publish never + explicit gh upload: electron-builder refuses to upload to
      # an already-PUBLISHED release (it only manages drafts), which silently
      # detaches artifacts from gh-created releases. gh upload --clobber always works.
      # Packaging must TRUST the direct-gyp .node files above on EVERY platform:
      # the internal rebuild is the same @electron/rebuild spawn that hangs, so
      # npmRebuild=false. macOS also gets --arm64 (the bypass only built the
      # runner-native arch — see the install step's note).
      # shell: bash — windows pwsh re-tokenizes the -c.key=value flags into a
      # config-file path (see ci.yml signing-dryrun).
      # macOS: `dmg:arm64 zip:arm64` — the explicit target:arch form. A bare
      # `--arm64` did NOT restrict the build: electron-builder still packaged x64
      # from the config's arch list, and with npmRebuild=false the x64 app got the
      # arm64 direct-gyp .node files -> a crash-on-Intel artifact (run 28759409843,
      # x64 assets deleted). This form builds ONLY arm64, so the feed is honest.
      # (electron-builder.yml no longer lists mac x64 either; this stays as the
      # explicit guard so a config edit alone can't resurrect the broken artifact.)
      - name: Package (sign/notarize when secrets present)
        shell: bash
        run: npx electron-builder ${{ runner.os == 'macOS' && '--mac dmg:arm64 zip:arm64' || '' }} --publish never -c.npmRebuild=false -c.buildDependenciesFromSource=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Keychain identity lookup stays OFF: with no cert it lets mac artifacts
          # build UNSIGNED instead of failing, and once the CSC_LINK secret lands
          # signing activates from the imported cert alone — this flag only
          # suppresses picking up stray keychain identities.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # *.blockmap (unqualified) so the mac zip's blockmap rides along too — the old glob
      # only matched *.exe.blockmap, so macOS could never download differentially.
      - name: Upload artifacts to the release
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          shopt -s nullglob
          FILES=(dist/*.exe dist/*.dmg dist/*.zip dist/*.AppImage dist/*.deb dist/*.blockmap dist/latest*.yml)
          gh release upload "$TAG" "${FILES[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # THE GATE THAT WAS MISSING. Every latest*.yml names the file electron-updater will
      # fetch; if that name is not an asset on the release, every update 404s — silently,
      # because the only symptom is an `error` phase in an app we cannot see.
      #
      # That is exactly what shipped from v0.3.0 to v0.9.0: productName carries a space, so
      # the built file was "MoggingLabs Workspace-x-win-x64.exe", the yml pointed at the
      # hyphenated name electron-updater derives, and GitHub stored the upload with the space
      # turned into a DOT. Three names, no update. artifactName is now space-free — this step
      # makes sure it STAYS that way, and fails the release instead of shipping a dead feed.
      - name: Verify the update feed resolves
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release view "$TAG" --json assets -q '.assets[].name' | tr -d '\r' | sort > assets.txt
          echo "── assets on $TAG:"; sed 's/^/    /' assets.txt

          # every `url:` under files:, plus the legacy top-level `path:` — the names
          # electron-updater will actually request.
          cat dist/latest*.yml \
            | grep -E '^[[:space:]]*(-[[:space:]]*url|path):' \
            | sed -E 's/^[^:]*:[[:space:]]*//' | tr -d '\r' | sort -u > wanted.txt

          rc=0
          for name in $(cat wanted.txt); do
            if grep -qxF "$name" assets.txt; then
              echo "  ok      feed -> $name"
            else
              echo "  MISSING feed -> $name   (electron-updater will 404 on this)"
              rc=1
            fi
            # The blockmap is derived as <installer-url>.blockmap and is never listed in the
            # yml. Absent, updates still work — they just silently lose differential download,
            # so this warns rather than fails.
            case "$name" in
              *.exe|*.zip)
                grep -qxF "$name.blockmap" assets.txt \
                  && echo "  ok      delta -> $name.blockmap" \
                  || echo "  WARN    no $name.blockmap — updates fall back to a FULL download" ;;
            esac
          done
          exit $rc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload sourcemaps so Sentry de-minifies crash stacks (ADR 0005). Skipped without a token.
      - name: Upload sourcemaps to Sentry
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        uses: getsentry/action-release@v3
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          version: ${{ github.ref_name }}
          sourcemaps: ./out
          finalize: true
