name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Full 83-gate sweeps are heavy (~4h each): nightly, staggered per OS, + on demand.
  schedule:
    - cron: '30 3 * * *' # linux-sweep
    - cron: '30 4 * * *' # macos-sweep
    - cron: '30 5 * * *' # windows-sweep
  workflow_dispatch:
    inputs:
      gates:
        description: 'Gate subset for sweep jobs, comma list (empty = all gates). Iteration only — certification is the full sweep.'
        required: false
        default: ''
      sweeps:
        description: 'Which OS sweeps this dispatch runs: comma list from linux,macos,windows (use "none" to skip sweeps)'
        required: false
        default: 'linux,macos,windows'
      signing_dryrun:
        description: 'Also run the signing/notarization dry run (packages win+mac UNSIGNED, verifies readiness)'
        type: boolean
        required: false
        default: false

# Pushes supersede pushes; sweeps (dispatch/schedule) NEVER cancel anything and
# never get cancelled — one shared group let a late-firing nightly kill an
# in-flight dispatched sweep (2026-07-03, runs 28643392895/28643654614).
concurrency:
  group: ci-${{ github.ref }}-${{ (github.event_name == 'push' || github.event_name == 'pull_request') && 'fast' || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}

jobs:
  verify:
    name: typecheck + build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-26, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      # Native modules (node-pty, better-sqlite3) are EXTERNALIZED in the build and used only
      # at runtime/packaging, never bundled — so typecheck + build don't need their compiled
      # binaries. Skip install scripts so CI never tries to compile better-sqlite3 (which has
      # no Node prebuild here and no VS/Xcode on the runner). The Electron-ABI rebuild happens
      # via the postinstall in dev and via electron-builder at packaging (step 07).
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      # The pty seam is a structural invariant (node-pty only via backend/platform/pty-host.ts).
      # Pure Node, no native deps — cheap enough to run on every push, not just nightly sweeps.
      - name: PTY seam gate
        run: node scripts/check-pty-seam.mjs

      # Two more lists-that-must-agree, same cost, same reason. Both failed silently before
      # they were gated: a stale PROTOCOL_VERSION points the CLI at a directory no daemon
      # writes ("the daemon is not running", against a live one), and a gate missing from
      # SMOKE_ENV runs as a REAL app — taking the instance lock and the mogging:// scheme.
      - name: Protocol version gate
        run: node scripts/check-protocol-version.mjs

      - name: Gate registry gate
        run: node scripts/check-gates.mjs

      # A space in artifactName 404s every update download, on every platform, silently — it
      # shipped nine times. Same class as the two above: a list that must agree with itself,
      # invisible when wrong, free to check.
      - name: Update-feed gate
        run: node scripts/check-update-feed.mjs

      - name: Build
        run: npm run build

  # Phase-4/06: the third platform must BUILD AND BOOT — full native install, the
  # SMOKE gate headless under xvfb, then the AppImage + deb package. The full
  # 35-gate sweep on Linux is a follow-up; this asserts build + boot.
  linux-boot:
    name: linux boot + package
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Toolchain + headless X (node-pty/better-sqlite3 compile from source)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-setuptools xvfb

      - name: Cache native node_modules (electron-ABI .node files included)
        id: nmcache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}-e34

      - name: Install (packages only)
        if: steps.nmcache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Electron binary (its install script was skipped above)
        if: steps.nmcache.outputs.cache-hit != 'true'
        run: node node_modules/electron/install.js

      - name: Electron-ABI rebuild (direct node-gyp)
        if: steps.nmcache.outputs.cache-hit != 'true'
        # Same bypass as linux-sweep — see that job's comment (bisected 2026-07-03).
        run: |
          EV=$(node -p "require('electron/package.json').version")
          for m in node-pty better-sqlite3; do
            echo "── rebuilding $m for electron $EV"
            (cd "node_modules/$m" && timeout 10m node ../node-gyp/bin/node-gyp.js rebuild \
              --runtime=electron --target="$EV" \
              --dist-url=https://www.electronjs.org/headers --build-from-source < /dev/null)
          done

      - name: Build
        run: npm run build

      - name: Smoke (headless boot gate)
        run: |
          # Electron's SUID sandbox helper must be root:4755 (never true on a CI
          # checkout) — fix it rather than disable the sandbox.
          sudo chown root node_modules/electron/dist/chrome-sandbox
          sudo chmod 4755 node_modules/electron/dist/chrome-sandbox
          ISO=$(mktemp -d)
          mkdir -p "$ISO/userdata" "$ISO/local"
          rm -f out/smoke-result.json
          MOGGING_USERDATA="$ISO/userdata" XDG_RUNTIME_DIR="$ISO/local" MOGGING_SMOKE=1 \
            xvfb-run -a timeout 180 npm run dev || true
          node -e "const r=require('./out/smoke-result.json');if(r.pass!==true){console.error(JSON.stringify(r));process.exit(1)};console.log('SMOKE PASS')"

      - name: Package (AppImage + deb)
        # -c.npmRebuild=false: packaging's INTERNAL rebuild is the same
        # @electron/rebuild spawn that hangs on this image — the direct node-gyp
        # step above already produced the electron-ABI .node files it would build.
        run: npx electron-builder --linux --publish never -c.npmRebuild=false -c.buildDependenciesFromSource=false

  # Phase-6/02: the ENTIRE 35-gate sweep on Linux — same script, same gate list as
  # Windows. Nightly + manual (heavy); the fast boot gate above still runs per push.
  # MOGGING_CI_GPU=soft relaxes ONLY frame-gap budgets (software GL under xvfb) and
  # prints loudly in every affected smoke's log; all other claims are untouched.
  linux-sweep:
    name: linux full sweep (all gates)
    # Each nightly cron drives exactly ONE OS's sweep (staggered so two heavy
    # sweeps never contend); a dispatch picks its sweeps via the `sweeps` input.
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 3 * * *') ||
      (github.event_name == 'workflow_dispatch' && contains(inputs.sweeps, 'linux'))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      # gnome-keyring + dbus-x11: the vault gates (VAULTKEYS/EVBRIDGE/INTEGMILESTONE)
      # need a REAL safeStorage backend. Headless Linux has none by default, so
      # Electron's getSelectedStorageBackend() is 'basic_text' -> vaultAvailable()
      # false -> those gates fail. The sweep step stands up an unlocked keyring on
      # a dbus session + MOGGING_CI_KEYRING forces the gnome-libsecret backend.
      - name: Toolchain + headless X + keyring
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-setuptools xvfb gnome-keyring dbus-x11 libsecret-1-0

      - name: Cache native node_modules (electron-ABI .node files included)
        id: nmcache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}-e34

      - name: Install (packages only)
        if: steps.nmcache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Electron binary (its install script was skipped above)
        if: steps.nmcache.outputs.cache-hit != 'true'
        run: node node_modules/electron/install.js

      - name: Electron-ABI rebuild (direct node-gyp)
        if: steps.nmcache.outputs.cache-hit != 'true'
        # @electron/rebuild's spawned gyp hangs indefinitely on the 2026-07 images
        # (ubuntu bisected 2026-07-03, run 28639452382; win + mac reproduced, run
        # 28647921078 — direct invocation builds fine everywhere). CI drives
        # node-gyp directly; dev machines keep the standard postinstall.
        run: |
          EV=$(node -p "require('electron/package.json').version")
          for m in node-pty better-sqlite3; do
            echo "── rebuilding $m for electron $EV"
            (cd "node_modules/$m" && timeout 10m node ../node-gyp/bin/node-gyp.js rebuild \
              --runtime=electron --target="$EV" \
              --dist-url=https://www.electronjs.org/headers --build-from-source < /dev/null)
          done

      - name: Build
        run: npm run build

      - name: Sandbox helper perms
        run: |
          sudo chown root node_modules/electron/dist/chrome-sandbox
          sudo chmod 4755 node_modules/electron/dist/chrome-sandbox

      # dbus-run-session gives Electron a session bus; the unlocked gnome-keyring
      # (empty password) registers org.freedesktop.secrets so libsecret resolves.
      - name: Full sweep (all gates, isolated state)
        run: |
          MOGGING_CI_GPU=soft MOGGING_CI_KEYRING=1 MOGGING_GATES="${{ inputs.gates }}" \
            xvfb-run -a dbus-run-session -- bash -c '
              export $(printf "\n" | gnome-keyring-daemon --unlock --components=secrets --daemonize)
              bash scripts/qa-smokes.sh
            ' | tee sweep.log

      - name: Gate on results
        run: |
          if ! grep -q 'SWEEP RESULTS' sweep.log; then
            echo '::error::sweep never printed results'; exit 1
          fi
          BAD=$(sed -n '/SWEEP RESULTS/,$p' sweep.log | grep -cE ' (FAIL|MISSING)$' || true)
          if [ "$BAD" != "0" ]; then
            echo "::error::$BAD gate(s) failed"; sed -n '/SWEEP RESULTS/,$p' sweep.log; exit 1
          fi
          echo 'ALL GATES PASS'; sed -n '/SWEEP RESULTS/,$p' sweep.log

      - name: Upload result JSONs (pass or fail — the green run's numbers get recorded)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # Per-OS names: one dispatch can run several sweeps in the same run,
          # and same-named artifacts would collide.
          name: sweep-results-linux
          path: |
            out/*-result.json
            sweep.log
          if-no-files-found: warn

  # Phase-6/02: the third platform runs EVERYTHING — same script, same gate list
  # as Windows and Linux. The runner CAN be desktop-class (strict PERCEPTION
  # passed with 0.9ms echo, run 28657760100) but stress perf is BIMODAL across
  # runs — 57fps/gap-200.8 one run, 19.8fps/gap-149.8 the next (28658338954),
  # opposite members on identical code. That's shared-vCPU scheduling, i.e.
  # frame-timing noise: exactly what MOGGING_CI_GPU=soft covers (loudly,
  # frame-timing only; echo/heap/correctness stay strict).
  macos-sweep:
    name: macos full sweep (all gates)
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 4 * * *') ||
      (github.event_name == 'workflow_dispatch' && contains(inputs.sweeps, 'macos'))
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      # setuptools: Python >= 3.12 dropped distutils and node-gyp needs it.
      # coreutils: the macOS 26 image ships NO GNU timeout/gtimeout, and
      # qa-smokes refuses to sweep without a watchdog (run 28657315132).
      - name: macOS toolchain
        run: |
          python3 -m pip install --break-system-packages setuptools
          brew install coreutils

      - name: Cache native node_modules (electron-ABI .node files included)
        id: nmcache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}-e34

      # The @electron/rebuild spawn hang is NOT ubuntu-only: this job's original
      # full `npm ci` sat at "executing @electron/rebuild" for 25 minutes of zero
      # output (run 28647921078), same fingerprint as the ubuntu bisect. The whole
      # 2026-07 image family gets the direct node-gyp bypass. No inner timeout —
      # the step timeout is the watchdog (mac has no GNU `timeout`).
      - name: Install (packages only)
        if: steps.nmcache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Electron binary (its install script was skipped above)
        if: steps.nmcache.outputs.cache-hit != 'true'
        run: node node_modules/electron/install.js

      - name: Electron-ABI rebuild (direct node-gyp)
        if: steps.nmcache.outputs.cache-hit != 'true'
        timeout-minutes: 20
        run: |
          EV=$(node -p "require('electron/package.json').version")
          for m in node-pty better-sqlite3; do
            echo "── rebuilding $m for electron $EV"
            (cd "node_modules/$m" && node ../node-gyp/bin/node-gyp.js rebuild \
              --runtime=electron --target="$EV" \
              --dist-url=https://www.electronjs.org/headers --build-from-source < /dev/null)
          done

      - name: Build
        run: npm run build

      - name: Full sweep (all gates, isolated state)
        run: |
          MOGGING_CI_GPU=soft MOGGING_GATES="${{ inputs.gates }}" bash scripts/qa-smokes.sh | tee sweep.log

      - name: Gate on results
        run: |
          if ! grep -q 'SWEEP RESULTS' sweep.log; then
            echo '::error::sweep never printed results'; exit 1
          fi
          BAD=$(sed -n '/SWEEP RESULTS/,$p' sweep.log | grep -cE ' (FAIL|MISSING)$' || true)
          if [ "$BAD" != "0" ]; then
            echo "::error::$BAD gate(s) failed"; sed -n '/SWEEP RESULTS/,$p' sweep.log; exit 1
          fi
          echo 'ALL GATES PASS'; sed -n '/SWEEP RESULTS/,$p' sweep.log

      - name: Upload result JSONs (pass or fail — the green run's numbers get recorded)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sweep-results-macos
          path: |
            out/*-result.json
            sweep.log
          if-no-files-found: warn

  # Phase-6/03: Windows regression coverage stops depending on the dev machine —
  # the ENTIRE 35-gate sweep on windows-latest. Same script, same gate list:
  # Git Bash drives qa-smokes.sh through its native MINGW branches (the local-dev
  # path). No GPU on the runner -> MOGGING_CI_GPU=soft, the same frame-timing-only
  # honesty as linux/macos. The @electron/rebuild spawn hang is confirmed on this
  # image too (40 min of zero output, run 28647921078) and node-gyp 13 driven
  # directly finds VS2026 (same run: gyp info ok) -> direct bypass, no probe needed.
  # Every run step is shell: bash — pwsh re-tokenizes flags and can't run the
  # sweep's grep/sed gate.
  windows-sweep:
    name: windows full sweep (all gates)
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 5 * * *') ||
      (github.event_name == 'workflow_dispatch' && contains(inputs.sweeps, 'windows'))
    runs-on: windows-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Cache native node_modules (electron-ABI .node files included)
        id: nmcache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}-e34

      - name: Install (packages only)
        if: steps.nmcache.outputs.cache-hit != 'true'
        shell: bash
        run: npm ci --ignore-scripts

      - name: Electron binary (its install script was skipped above)
        if: steps.nmcache.outputs.cache-hit != 'true'
        shell: bash
        run: node node_modules/electron/install.js

      - name: Electron-ABI rebuild (direct node-gyp)
        if: steps.nmcache.outputs.cache-hit != 'true'
        shell: bash
        timeout-minutes: 25
        run: |
          EV=$(node -p "require('electron/package.json').version")
          for m in node-pty better-sqlite3; do
            echo "── rebuilding $m for electron $EV"
            (cd "node_modules/$m" && node ../node-gyp/bin/node-gyp.js rebuild \
              --runtime=electron --target="$EV" \
              --dist-url=https://www.electronjs.org/headers --build-from-source < /dev/null)
          done

      - name: Build
        shell: bash
        run: npm run build

      - name: Full sweep (all gates, isolated state)
        shell: bash
        run: |
          MOGGING_CI_GPU=soft MOGGING_GATES="${{ inputs.gates }}" bash scripts/qa-smokes.sh | tee sweep.log

      - name: Gate on results
        shell: bash
        run: |
          if ! grep -q 'SWEEP RESULTS' sweep.log; then
            echo '::error::sweep never printed results'; exit 1
          fi
          BAD=$(sed -n '/SWEEP RESULTS/,$p' sweep.log | grep -cE ' (FAIL|MISSING)$' || true)
          if [ "$BAD" != "0" ]; then
            echo "::error::$BAD gate(s) failed"; sed -n '/SWEEP RESULTS/,$p' sweep.log; exit 1
          fi
          echo 'ALL GATES PASS'; sed -n '/SWEEP RESULTS/,$p' sweep.log

      - name: Upload result JSONs (pass or fail — the green run's numbers get recorded)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sweep-results-windows
          path: |
            out/*-result.json
            sweep.log
          if-no-files-found: warn

  # Phase-6/02: prove a signed release is a SECRETS-ONLY change away. Packages
  # win + mac UNSIGNED (no certs/tokens live in this repo — ADR 0002 discipline
  # applies to our own secrets too), then verifies everything signing would need:
  # entitlements, hardened runtime, identity plumbing, notarization config.
  signing-dryrun:
    name: signing dry run (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch' && inputs.signing_dryrun == true
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-26]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: macOS toolchain
        if: runner.os == 'macOS'
        run: python3 -m pip install --break-system-packages setuptools

      # Direct node-gyp on BOTH OSes: the 2026-07 win/mac images hang the
      # @electron/rebuild spawn exactly like ubuntu (runs 28647921078: win + mac
      # dry runs both timed out inside `npm ci`).
      - name: Install dependencies (direct node-gyp bypass)
        shell: bash
        timeout-minutes: 25
        run: |
          npm ci --ignore-scripts
          node node_modules/electron/install.js
          EV=$(node -p "require('electron/package.json').version")
          for m in node-pty better-sqlite3; do
            echo "── rebuilding $m for electron $EV"
            (cd "node_modules/$m" && node ../node-gyp/bin/node-gyp.js rebuild \
              --runtime=electron --target="$EV" \
              --dist-url=https://www.electronjs.org/headers --build-from-source < /dev/null)
          done

      - name: Build
        run: npm run build

      # npmRebuild=false: packaging must trust the direct-gyp .node files (its
      # internal rebuild is the hanging spawn). Mac packages arm64 only — the
      # runner-native arch matches those .node files, and one signed-shape
      # artifact set is all the readiness verifier needs.
      # shell: bash — under windows pwsh the -c.key=value flags get re-tokenized
      # and electron-builder reads them as a config FILE path (run 28657315132:
      # "ENOENT: .buildDependenciesFromSource=false").
      - name: Package UNSIGNED (identity discovery off; no signing secrets in env)
        shell: bash
        run: npx electron-builder --publish never -c.npmRebuild=false -c.buildDependenciesFromSource=false ${{ runner.os == 'macOS' && '--arm64' || '' }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify signing readiness
        run: node scripts/verify-signing-readiness.mjs

  # Phase-6/02: install manifests must VALIDATE continuously where the tooling
  # exists, so submission day is a copy-paste PR. Dispatch + once nightly (tied
  # to the linux cron so two crons don't double-run them).
  manifests-winget:
    name: winget manifest validation
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '30 3 * * *')
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # winget isn't usable out of the box on the server-based runner image —
      # bootstrap it via the official PowerShell module.
      - name: Bootstrap winget
        shell: pwsh
        run: |
          Install-Module Microsoft.WinGet.Client -Force -Scope CurrentUser
          Repair-WinGetPackageManager -Latest
          winget --version

      - name: winget validate
        shell: pwsh
        run: winget validate --manifest packaging/winget

  manifests-brew:
    name: homebrew cask style
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '30 3 * * *')
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      # No --cask flag: with slashes in the arg it resolves a TAP token
      # ("packaging/homebrew-homebrew" — run 28657315132). A plain file path
      # under Casks/ engages the cask cops by location.
      - name: brew style
        run: brew style packaging/homebrew/Casks/mogginglabs-workspace.rb
