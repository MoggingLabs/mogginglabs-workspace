appId: ai.mogginglabs.workspace
productName: MoggingLabs Workspace
# Compile native modules FROM SOURCE against Electron's ABI (no prebuilt binaries) — the
# proper implementation now that the VS C++ Build Tools toolchain is installed.
buildDependenciesFromSource: true
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# Native modules (node-pty, better-sqlite3) are unpacked so they load from disk at runtime.
asarUnpack:
  - "**/node_modules/node-pty/**"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/bindings/**"

# Signed release feed for electron-updater. owner/repo are public; the release token (GH_TOKEN)
# is a CI secret, never committed.
publish:
  provider: github
  owner: MoggingLabs
  repo: mogginglabs-workspace

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-win-${arch}.${ext}
  # Authenticode signing runs when CSC_LINK (base64 .pfx) + CSC_KEY_PASSWORD are in the
  # environment (CI secrets) — required to avoid SmartScreen warnings. No cert is committed.

mac:
  target:
    - target: dmg # installer
      arch:
        - arm64
        - x64
    - target: zip # required by electron-updater for macOS auto-update
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Signing uses CSC_LINK (base64 .p12) + CSC_KEY_PASSWORD; notarization runs when APPLE_ID +
  # APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID are in the environment (CI secrets). Required for
  # install-without-warnings.
  notarize: true

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# Linux (Phase-4/06): the third platform. Built on Linux hosts/CI (electron-builder
# does not cross-build Linux targets from Windows). No platform logic forks in
# features — differences live in @backend/platform + this config only.
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
  category: Development
  synopsis: Multi-pane terminal workspace for AI coding agents
  maintainer: MoggingLabs <hello@mogginglabs.ai>
